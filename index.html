<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Christy Hu — Coming Soon</title>
  <meta name="description" content="Christy Hu is a Product Designer with 3 years of experience. Coming soon at christy-hu.com."/>

  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-167785635"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){ dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', 'G-167785635');
  </script>

  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --ink: #0d0d0d;
      --muted: #aaaaaa;
      --pad: 32px;
    }

    html, body { height: 100%; background: var(--bg); color: var(--ink); }

    body {
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      display: grid;
      grid-template-columns: 1fr 1fr;
      align-items: start;
      padding: 28px var(--pad) 22px;
      border-bottom: 1px solid var(--ink);
    }

    .logo img {
      height: 200px;
      width: auto;
      mix-blend-mode: multiply;
    }

    .header-bio {
      font-size: clamp(22px, 2.8vw, 42px);
      line-height: 1.2;
      color: var(--ink);
      font-weight: 400;
      text-align: left;
      letter-spacing: -0.02em;
    }

    /* ── MAIN ── */
    main {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
    }

    .main-left { /* empty left column */ }

    .main-right {
      display: flex;
      align-items: flex-end;
      padding: var(--pad);
    }

    .headline {
      font-family: 'Inter', sans-serif;
      font-size: clamp(22px, 2.8vw, 42px);
      font-weight: 400;
      line-height: 1.2;
      color: var(--ink);
      text-align: left;
      padding-bottom: 48px;
      letter-spacing: -0.02em;
    }

    .headline a {
      color: var(--ink);
      font-style: italic;
      text-decoration: underline;
      text-underline-offset: 4px;
      text-decoration-thickness: 1px;
      transition: opacity 0.2s;
    }
    .headline a:hover { opacity: 0.4; }

    /* ── FOOTER / EMAIL ── */
    footer { border-top: 1px solid var(--ink); }

    .email-row {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      padding: 22px var(--pad);
      border-bottom: 1px solid var(--ink);
    }

    .email-row input {
      background: transparent;
      border: none;
      outline: none;
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      font-size: 22px;
      color: var(--ink);
      width: 100%;
    }
    .email-row input::placeholder { color: var(--muted); }

    .notify-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      font-weight: 400;
      font-size: 22px;
      color: var(--ink);
      white-space: nowrap;
      padding-left: 32px;
      transition: opacity 0.2s;
    }
    .notify-btn:hover { opacity: 0.4; }
    .notify-btn:disabled { opacity: 0.4; cursor: default; }

    .form-feedback {
      font-size: 11px;
      letter-spacing: 0.06em;
      color: var(--muted);
      padding: 10px var(--pad) 0;
      min-height: 28px;
    }

    @media (max-width: 600px) {
      header { grid-template-columns: 1fr; gap: 16px; }
      main { grid-template-columns: 1fr; }
      .main-left { display: none; }
      .headline { font-size: clamp(20px, 6vw, 32px); }
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">
      <img src="hu_logo.png" alt="hu logo"/>
    </div>
    <p class="header-bio">
      Christy Hu is a Product Designer with 3 years of experience,<br/>
      currently designing growth systems for the iOS Google search app.
    </p>
  </header>

  <main>
    <div class="main-left"></div>
    <div class="main-right">
      <h1 class="headline">
        New website in the works.<br/>
        Find me on <a href="https://www.linkedin.com/in/christy-hu" target="_blank">LinkedIn</a> in the meantime.
      </h1>
    </div>
  </main>

  <footer>
    <div class="email-row">
      <input
        type="email"
        id="emailInput"
        placeholder="Your email"
        autocomplete="off"
      />
      <button class="notify-btn" id="notifyBtn" onclick="handleNotify()">Notify me when live</button>
    </div>
    <div class="form-feedback" id="feedback"></div>
  </footer>

  <script>
    async function handleNotify() {
      const input    = document.getElementById('emailInput');
      const btn      = document.getElementById('notifyBtn');
      const feedback = document.getElementById('feedback');
      const email    = input.value.trim();

      if (!email || !email.includes('@')) {
        input.placeholder = 'Enter a valid email';
        setTimeout(() => { input.placeholder = 'Your email'; }, 2000);
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Sending…';

      gtag('event', 'notify_me_signup', {
        event_category: 'engagement',
        event_label: 'email_signup'
      });

      try {
        const res = await fetch('https://formspree.io/f/xgonvkgr', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
          body: JSON.stringify({ email })
        });

        if (res.ok) {
          input.value = '';
          input.disabled = true;
          input.placeholder = "You're on the list.";
          btn.textContent = 'Done';
          feedback.textContent = "I'll reach out as soon as it's ready.";
        } else {
          btn.disabled = false;
          btn.textContent = 'Notify me when live';
          feedback.textContent = 'Something went wrong. Please try again.';
        }
      } catch (e) {
        btn.disabled = false;
        btn.textContent = 'Notify me when live';
        feedback.textContent = 'Connection error. Please try again.';
      }
    }

    document.getElementById('emailInput').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') handleNotify();
    });
  </script>

</body>
</html>
