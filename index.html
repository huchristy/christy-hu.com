<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Crstid Signs — Coming Soon</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Instrument+Serif:ital@0;1&family=Caveat:wght@700&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --ink: #0d0d0d;
      --muted: #aaaaaa;
      --rule: #d8d8d8;
      --pad: 32px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      display: grid;
      grid-template-columns: 1fr 1fr;
      align-items: start;
      padding: 28px var(--pad) 22px;
      border-bottom: 1px solid var(--ink);
    }

    .logo {
      font-family: 'Caveat', cursive;
      font-weight: 700;
      font-size: 52px;
      line-height: 1;
      color: var(--ink);
      letter-spacing: -0.01em;
    }

    .header-bio {
      font-size: 13.5px;
      line-height: 1.65;
      color: var(--ink);
      font-weight: 400;
      padding-top: 4px;
    }

    /* ── MAIN ── */
    main {
      flex: 1;
      display: flex;
      align-items: flex-end;
      justify-content: flex-end;
      padding: var(--pad);
    }

    .headline {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(36px, 5.5vw, 68px);
      font-weight: 400;
      line-height: 1.18;
      color: var(--ink);
      max-width: 560px;
      text-align: left;
      padding-bottom: 48px;
    }

    /* ── FOOTER / EMAIL ── */
    footer {
      border-top: 1px solid var(--ink);
    }

    .email-row {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      padding: 22px var(--pad);
      border-bottom: 1px solid var(--ink);
    }

    .email-row input {
      background: transparent;
      border: none;
      outline: none;
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      font-size: 22px;
      color: var(--ink);
      width: 100%;
    }
    .email-row input::placeholder {
      color: var(--muted);
    }

    .notify-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-weight: 400;
      font-size: 22px;
      color: var(--ink);
      white-space: nowrap;
      padding-left: 32px;
      transition: opacity 0.2s;
    }
    .notify-btn:hover { opacity: 0.4; }
    .notify-btn.done  { opacity: 0.4; cursor: default; }
  </style>
</head>
<body>

  <header>
    <div class="logo">crstid</div>
    <p class="header-bio">
      Crstid Signs is a design studio crafting thoughtful visual identities.<br/>
      Currently rebuilding at <a href="https://christy-hu.com" style="color:inherit;">christy-hu.com</a>.
    </p>
  </header>

  <main>
    <h1 class="headline">
      Taking the time<br/>to get it right.<br/>Come back later.
    </h1>
  </main>

  <footer>
    <div class="email-row">
      <input
        type="email"
        id="emailInput"
        placeholder="Your email"
        autocomplete="off"
      />
      <button class="notify-btn" id="notifyBtn" onclick="handleNotify()">Notify me</button>
    </div>
  </footer>

  <script>
    function handleNotify() {
      const input = document.getElementById('emailInput');
      const btn   = document.getElementById('notifyBtn');
      if (!input.value || !input.value.includes('@')) {
        input.placeholder = 'Enter a valid email';
        setTimeout(() => { input.placeholder = 'Your email'; }, 2000);
        return;
      }
      input.value = '';
      input.placeholder = "You're on the list.";
      input.disabled = true;
      btn.textContent = 'Done';
      btn.classList.add('done');
      btn.disabled = true;
    }
  </script>

</body>
</html>
